<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Capture</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    color: #fff;
    font-family: monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px;
  }
  h1 { font-size: 13px; color: #666; letter-spacing: 0.1em; text-transform: uppercase; }

  /* ── 撮影対象のアイコン要素 ── */
  #icon-target {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 120px;
    height: 120px;
    border-radius: 0; /* 四角！ */
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-size: 64px;
    line-height: 1;
  }

  .row {
    display: flex;
    gap: 32px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }
  .box { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .label { font-size: 11px; color: #555; letter-spacing: 0.08em; text-transform: uppercase; }

  canvas { border: 1px solid #333; border-radius: 4px; display: block; }

  .btn {
    background: #667eea;
    color: #fff;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #764ba2; }

  #size-row {
    display: flex; gap: 8px; align-items: center;
    font-size: 12px; color: #666;
  }
  #size-row input {
    background: #1a1a1a; border: 1px solid #333; color: #aaa;
    padding: 4px 8px; border-radius: 6px; font-family: monospace;
    font-size: 12px; width: 72px; text-align: center;
  }
</style>
</head>
<body>

<h1>🚀 Icon Capture</h1>

<div class="row">
  <div class="box">
    <div class="label">撮影元（四角）</div>
    <!-- ここが tools.html の header と同じ描画 -->
    <div id="icon-target">🚀</div>
  </div>
  <div class="box">
    <div class="label">キャプチャ結果</div>
    <canvas id="preview" width="120" height="120"></canvas>
  </div>
</div>

<div id="size-row">
  出力サイズ: <input type="number" id="out-size" value="1024"> px
</div>

<button class="btn" onclick="capture()">📸 キャプチャして保存するゆ！🥹</button>

<script>
async function capture() {
  const target = document.getElementById('icon-target');
  const outSize = parseInt(document.getElementById('out-size').value) || 1024;

  const shot = await html2canvas(target, {
    scale: outSize / target.offsetWidth,
    useCORS: true,
    backgroundColor: null,
    logging: false,
  });

  // プレビューに表示
  const preview = document.getElementById('preview');
  const pctx = preview.getContext('2d');
  preview.width = 120; preview.height = 120;
  pctx.drawImage(shot, 0, 0, 120, 120);

  // ダウンロード
  const a = document.createElement('a');
  a.download = `app_icon_${outSize}x${outSize}.png`;
  a.href = shot.toDataURL('image/png');
  a.click();
}

// ページ読み込み時に自動プレビュー
window.onload = async () => {
  const target = document.getElementById('icon-target');
  const shot = await html2canvas(target, {
    scale: 2,
    useCORS: true,
    backgroundColor: null,
    logging: false,
  });
  const preview = document.getElementById('preview');
  const pctx = preview.getContext('2d');
  pctx.drawImage(shot, 0, 0, 120, 120);
};
</script>
</body>
</html>
