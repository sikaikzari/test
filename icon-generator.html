<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    color: #fff;
    font-family: monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px;
  }
  h1 { font-size: 13px; color: #666; letter-spacing: 0.1em; text-transform: uppercase; }
  .row { display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
  .box { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .label { font-size: 11px; color: #555; letter-spacing: 0.08em; text-transform: uppercase; }
  canvas { border: 1px solid #333; border-radius: 4px; display: block; max-width: 160px; max-height: 160px; }
  .btn {
    background: #667eea; color: #fff; border: none;
    padding: 10px 28px; border-radius: 8px;
    font-family: monospace; font-size: 13px; cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #764ba2; }
  #size-row { display: flex; gap: 8px; align-items: center; font-size: 12px; color: #666; }
  #size-row input {
    background: #1a1a1a; border: 1px solid #333; color: #aaa;
    padding: 4px 8px; border-radius: 6px; font-family: monospace;
    font-size: 12px; width: 72px; text-align: center;
  }
</style>
</head>
<body>

<h1>🚀 Icon Generator</h1>

<div class="row">
  <div class="box">
    <div class="label">プレビュー（四角）</div>
    <canvas id="preview"></canvas>
  </div>
</div>

<div id="size-row">
  出力サイズ: <input type="number" id="out-size" value="1024"> px
</div>

<button class="btn" onclick="download()">⬇ PNG で保存するゆ！🥹</button>

<script>
function drawIcon(canvas, size) {
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // グラデ背景（tools.htmlと完全一致）
  const grad = ctx.createLinearGradient(0, 0, size, size); // 135deg
  grad.addColorStop(0, '#667eea');
  grad.addColorStop(1, '#764ba2');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);

  // 🚀絵文字（中央）
  const fontSize = size * 0.55;
  ctx.font = `${fontSize}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🚀', size / 2, size / 2);
}

// プレビュー描画
const preview = document.getElementById('preview');
drawIcon(preview, 160);

function download() {
  const outSize = parseInt(document.getElementById('out-size').value) || 1024;
  const out = document.createElement('canvas');
  drawIcon(out, outSize);

  const a = document.createElement('a');
  a.download = `app_icon_${outSize}x${outSize}.png`;
  a.href = out.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
