```html
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Image Mind Map Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none;
            overflow: hidden;
            background-color: #e5e7eb;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
        }
        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: auto;
            background: transparent;
        }
        .image-node {
            position: absolute;
            cursor: move;
            user-select: none;
            z-index: 20;
            border: 2px solid transparent;
            transition: border-color 0.2s;
            min-width: 50px;
            min-height: 50px;
            touch-action: none;
        }
        .image-node.active {
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        .image-node img {
            pointer-events: none;
            display: block;
            border-radius: 8px;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .controls {
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.9);
            padding: 0.75rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            width: 90%;
            max-width: 650px;
        }
        .btn {
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.875rem;
        }
        .btn-blue { background-color: #3b82f6; color: white; }
        .btn-red { background-color: #ef4444; color: white; }
        .btn-orange { background-color: #f97316; color: white; }
        .btn-green { background-color: #10b981; color: white; }
        .btn-gray { background-color: #6b7280; color: white; }
        .active-mode { ring: 2px ring-offset-2 ring-blue-500; opacity: 1; }
        .inactive-mode { opacity: 0.6; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*" class="hidden" multiple>
        <button onclick="document.getElementById('imageInput').click()" class="btn btn-blue">
            <span>📷</span> 追加
        </button>
        <button id="drawModeBtn" class="btn btn-gray active-mode">
            <span>✏️</span> ペイント
        </button>
        <button id="moveModeBtn" class="btn btn-gray inactive-mode">
            <span>🖐️</span> 移動
        </button>
        
        <button id="clearLinesBtn" class="btn btn-orange">
            <span>〰️</span> 線を消去
        </button>
        <button id="clearImagesBtn" class="btn btn-red">
            <span>🖼️</span> 画像を消去
        </button>
        
        <button id="saveBtn" class="btn btn-green">
            <span>💾</span> 保存
        </button>
    </div>

    <div id="canvas-container">
        <canvas id="paintCanvas"></canvas>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        let canvas = document.getElementById('paintCanvas');
        let ctx = canvas.getContext('2d');
        const imageInput = document.getElementById('imageInput');
        const drawModeBtn = document.getElementById('drawModeBtn');
        const moveModeBtn = document.getElementById('moveModeBtn');
        const clearLinesBtn = document.getElementById('clearLinesBtn');
        const clearImagesBtn = document.getElementById('clearImagesBtn');
        const saveBtn = document.getElementById('saveBtn');

        let isDrawing = false;
        let mode = 'draw'; 
        let lastX = 0;
        let lastY = 0;
        
        const strokeColor = '#2dd4bf'; // 青緑色だゆ！

        function setCtxStyle() {
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            setCtxStyle();
        }

        function resizeCanvas() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(canvas, 0, 0);

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            setCtxStyle();
            ctx.drawImage(tempCanvas, 0, 0);
        }

        window.addEventListener('resize', resizeCanvas);
        initCanvas();

        // 描画関連のリスナーだゆ
        const startDrawingHandler = (e) => {
            if (mode !== 'draw') return;
            isDrawing = true;
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            [lastX, lastY] = [clientX, clientY];
        };

        const drawHandler = (e) => {
            if (!isDrawing || mode !== 'draw') return;
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(clientX, clientY);
            ctx.stroke();
            [lastX, lastY] = [clientX, clientY];
        };

        const stopDrawingHandler = () => { isDrawing = false; };

        canvas.addEventListener('mousedown', startDrawingHandler);
        window.addEventListener('mousemove', drawHandler);
        window.addEventListener('mouseup', stopDrawingHandler);
        
        canvas.addEventListener('touchstart', (e) => {
            if (mode === 'draw') {
                startDrawingHandler(e);
                e.preventDefault();
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (mode === 'draw') {
                drawHandler(e);
                e.preventDefault();
            }
        }, { passive: false });

        canvas.addEventListener('touchend', stopDrawingHandler);

        drawModeBtn.addEventListener('click', () => setMode('draw'));
        moveModeBtn.addEventListener('click', () => setMode('move'));

        function setMode(newMode) {
            mode = newMode;
            if (mode === 'draw') {
                drawModeBtn.classList.replace('inactive-mode', 'active-mode');
                moveModeBtn.classList.replace('active-mode', 'inactive-mode');
                canvas.style.zIndex = "30";
            } else {
                moveModeBtn.classList.replace('inactive-mode', 'active-mode');
                drawModeBtn.classList.replace('active-mode', 'inactive-mode');
                canvas.style.zIndex = "10";
            }
        }

        imageInput.addEventListener('change', (e) => {
            const files = e.target.files;
            for (let file of files) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    createImageNode(event.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        function createImageNode(src) {
            const div = document.createElement('div');
            div.className = 'image-node';
            div.style.left = '50px';
            div.style.top = '200px';
            div.style.width = '200px';

            const img = document.createElement('img');
            img.src = src;
            div.appendChild(img);
            
            div.addEventListener('dblclick', () => div.remove());

            let isDraggingNode = false;
            let moveOffset = { x: 0, y: 0 };
            
            // 個別の画像ノード用のピンチズーム状態だゆ！🥺
            let nodeInitialDistance = 0;
            let nodeInitialWidth = 0;

            const onStart = (e) => {
                if (mode !== 'move') return;
                div.classList.add('active');
                div.style.zIndex = "100";

                if (e.touches && e.touches.length === 2) {
                    // この画像の上での2本指操作を検知したゆ！🥹
                    isDraggingNode = false;
                    nodeInitialDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    nodeInitialWidth = div.offsetWidth;
                } else {
                    // 1本指なら移動だゆ！
                    isDraggingNode = true;
                    const clientX = e.clientX || e.touches[0].clientX;
                    const clientY = e.clientY || e.touches[0].clientY;
                    moveOffset.x = clientX - div.offsetLeft;
                    moveOffset.y = clientY - div.offsetTop;
                }
            };

            const onMove = (e) => {
                if (mode !== 'move') return;

                if (e.touches && e.touches.length === 2) {
                    // 個別のピンチリサイズだゆ！
                    const currentDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    if (nodeInitialDistance > 0) {
                        const zoomFactor = currentDistance / nodeInitialDistance;
                        const newWidth = nodeInitialWidth * zoomFactor;
                        if (newWidth > 40) {
                            div.style.width = newWidth + 'px';
                        }
                    }
                } else if (isDraggingNode) {
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    div.style.left = (clientX - moveOffset.x) + 'px';
                    div.style.top = (clientY - moveOffset.y) + 'px';
                }
            };

            const onEnd = () => {
                isDraggingNode = false;
                nodeInitialDistance = 0;
                div.classList.remove('active');
                div.style.zIndex = "20";
            };

            div.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);

            div.addEventListener('touchstart', (e) => {
                onStart(e);
                if (mode === 'move') e.preventDefault();
            }, { passive: false });
            window.addEventListener('touchmove', (e) => {
                onMove(e);
                if (mode === 'move') e.preventDefault();
            }, { passive: false });
            window.addEventListener('touchend', onEnd);

            container.appendChild(div);
        }

        // --- 強力な消去処理：キャンバスを物理的にリセットするゆ！ ---
        clearLinesBtn.addEventListener('click', () => {
            if (confirm('描いた線だけを全部消すゆ？🥺')) {
                // キャンバスをクリアするだゆ
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                /* バックアップ：以前の方法 
                canvas.width = canvas.width;
                setCtxStyle();
                */
                
                // パスを完全に忘却させるゆ！🥹
                ctx.beginPath();
            }
        });

        clearImagesBtn.addEventListener('click', () => {
            if (confirm('貼った画像を全部消すゆ？🥺')) {
                document.querySelectorAll('.image-node').forEach(n => n.remove());
                imageInput.value = '';
            }
        });

        saveBtn.addEventListener('click', async () => {
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvas.width;
            exportCanvas.height = canvas.height;
            const exCtx = exportCanvas.getContext('2d');
            
            exCtx.drawImage(canvas, 0, 0);

            const nodes = document.querySelectorAll('.image-node');
            for (let node of nodes) {
                const img = node.querySelector('img');
                const x = parseInt(node.style.left);
                const y = parseInt(node.style.top);
                const w = node.offsetWidth;
                const h = node.offsetHeight;
                exCtx.drawImage(img, x, y, w, h);
            }

            const dataUrl = exportCanvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'mindmap_transparent.png';
            link.href = dataUrl;
            link.click();
        });
    </script>
</body>
</html>
