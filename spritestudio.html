            background-image: conic-gradient(#ffffff 25%, #d1d5db 25% 50%, #ffffff 50% 75%, #d1d5db 75%);
            background-size: 20px 20px;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        .selected-sprite { ring: 4px solid #38bdf8; position: relative; }
        .selection-number {
            position: absolute; top: 4px; right: 4px;
            background: #38bdf8; color: white;
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 13px; z-index: 20;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .tab-active { border-bottom: 4px solid #38bdf8; color: #38bdf8; }

        #map-bg {
            background-color: #2b3a67;

            background-size: 512px 512px;
            background-repeat: repeat;
            filter: saturate(0.8) brightness(0.8) hue-rotate(160deg);
        }

        .no-select { 
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-touch-callout: none;
        }

        .draggable-box {
            position: absolute;
            cursor: default;
            z-index: 10;
            display: flex;
            flex-direction: column;
            background-color: #1e293b;
            min-width: 140px;
            min-height: 80px;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .draggable-box:active { z-index: 100; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }

        .resizer { position: absolute; background: transparent; z-index: 60; }
        .resizer-rb { bottom: 0; right: 0; width: 14px; height: 14px; cursor: nwse-resize; z-index: 70; background: linear-gradient(135deg, transparent 50%, #475569 50%); border-bottom-right-radius: 1rem; }

        .main-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 100px);
            overflow: hidden;
        }

        /* --- 虫眼鏡のデザイン --- */
        #magnifier {
            position: fixed;
            pointer-events: none;
            display: none;
            z-index: 99999;
            width: 340px; 
            height: 408px;
            border: 4px solid #38bdf8;
            border-radius: 24px; /* 角丸四角形 */
            overflow: hidden;
            background-color: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transform: translate(-50%, -50%); /* 中央寄せ */
        }

        .pinned { z-index: 9998 !important; border: 2px solid #38bdf8 !important; }
        .pin-btn { font-size: 14px; opacity: 0.6; transition: opacity 0.2s; cursor: pointer; user-select: none; margin-right: 2px; }
        .pin-btn:hover { opacity: 1; color: #38bdf8; }
        .pinned .pin-btn { opacity: 1; filter: drop-shadow(0 0 2px #38bdf8); }

        /* ドロップ時オーバーレイ */
        #drop-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.6); /* うっすら白く */
            display: none;
            z-index: 100000;
            pointer-events: none;
            border: 8px dashed #38bdf8;
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            color: #38bdf8;
            font-weight: bold;
            font-size: 2rem;
        }

        @media (min-width: 1024px) {
            #box-preview { top: 0; left: 0; width: 24.5%; height: 38%; }
            #box-quick { top: 0; left: 25.5%; width: 24.5%; height: 38%; }
            #box-advanced { top: 40%; left: 0; width: 50.5%; height: 60%; }
            #box-browser { top: 0; right: 0; width: 48.5%; height: 100%; }
        }

        @media (max-width: 1023px) {
            body { padding: 0; overflow: hidden; height: 100vh; }
            header { position: sticky; top: 0; z-index: 2000; padding: 0.5rem; margin-bottom: 0; background-color: #0f172a; border-bottom: 1px solid #334155; }
            .main-container { height: calc(100vh - 80px); overflow: hidden; display: flex; flex-direction: column; padding: 0; }
            .mobile-fixed-top { flex-shrink: 0; display: flex; gap: 0.25rem; padding: 0.5rem; background-color: #0f172a; z-index: 1100; }

            .draggable-box { position: relative !important; top: auto !important; left: auto !important; width: 100% !important; height: auto !important; margin-bottom: 0.75rem; min-height: unset !important; }
            #box-browser { order: 99; }

        .d-pad { position: fixed; bottom: 30px; left: 20px; display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 12px; z-index: 3000; }
        .d-btn { width: 58px; height: 58px; background: rgba(30, 41, 59, 0.2); border: 2px solid rgba(56, 189, 248, 0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: rgba(255, 255, 255, 0.5); font-size: 24px; touch-action: none; backdrop-filter: blur(2px); }
        .d-btn:active { background: rgba(56, 189, 248, 0.4); color: #fff; transform: scale(0.9); border-color: #38bdf8; }
        .area-up { grid-area: up; } .area-down { grid-area: down; } .area-left { grid-area: left; } .area-right { grid-area: right; }

        const ROWS = 5, COLS = 6, SPRITE_W = 170, SPRITE_H = 204;
        let originalImg = null, spriteCanvases = [], selectedIndices = []; 
        let isPlaying = true, animationStep = 0, lastTimestamp = 0;
        let playerPos = { x: 300, y: 300 }; const keys = {};
        let isRecommendActive = false, previousSettings = null; 

        const imageInput = document.getElementById('imageInput');
        const gridContainer = document.getElementById('grid-container');
        const previewCanvas = document.getElementById('previewCanvas');
        const pCtxPC = previewCanvas.getContext('2d');
        const previewCanvasMobile = document.getElementById('previewCanvasMobile');
        const pCtxMobile = previewCanvasMobile.getContext('2d');
        const previewArea = document.getElementById('previewArea');
        const playerCanvas = document.getElementById('playerCanvas');
        const pCtxPlayer = playerCanvas.getContext('2d');
        const playerEl = document.getElementById('player');
        const magnifier = document.getElementById('magnifier');
        const magnifierCanvas = document.getElementById('magnifierCanvas');
        const mCtx = magnifierCanvas.getContext('2d');
        const dropOverlay = document.getElementById('drop-overlay');

        const thresholdInput = document.getElementById('threshold');
        const shrinkInput = document.getElementById('shrink');
        const blurInput = document.getElementById('blur');
        const outlineOpt = document.getElementById('outlineOpt');
        const outlineWidthInput = document.getElementById('outlineWidth');
        const outlineAlphaInput = document.getElementById('outlineAlpha');
        const outlineColorMatchInput = document.getElementById('outlineColorMatch');
        const outlineOffset = document.getElementById('outlineOffset');
        const trimXInput = document.getElementById('trimX');
        const trimYInput = document.getElementById('trimY');
        const fpsInput = document.getElementById('fpsInput');
        const fpsInputMobile = document.getElementById('fpsInputMobile');

        const ranges = [
            {in: thresholdInput, val: 'rangeVal1', f: v => v},
            {in: shrinkInput, val: 'rangeVal2', f: v => parseFloat(v).toFixed(1)},
            {in: blurInput, val: 'rangeVal3', f: v => parseFloat(v).toFixed(1)},
            {in: outlineWidthInput, val: 'rangeValWidth', f: v => parseFloat(v).toFixed(1)},
            {in: outlineAlphaInput, val: 'rangeValAlpha', f: v => parseFloat(v).toFixed(2)},
            {in: outlineColorMatchInput, val: 'rangeValColorMatch', f: v => parseFloat(v).toFixed(2)},
            {in: outlineOffset, val: 'rangeVal4', f: v => parseFloat(v).toFixed(1)},
            {in: trimXInput, val: 'rangeValX', f: v => v},
            {in: trimYInput, val: 'rangeValY', f: v => v}
        ];
        ranges.forEach(r => { r.in.oninput = () => { document.getElementById(r.val).innerText = r.f(r.in.value); }; });
        outlineOpt.onchange = () => {
            const sub = document.getElementById('outlineSubControl');
            sub.classList.toggle('opacity-40', !outlineOpt.checked);
            sub.classList.toggle('pointer-events-none', !outlineOpt.checked);
        };

        function processSprites(img) {
            gridContainer.innerHTML = ''; spriteCanvases = [];
            const temp = document.createElement('canvas'); temp.width = img.width; temp.height = img.height;
            temp.getContext('2d').drawImage(img, 0, 0);

        function erodeAlpha(ctx, amount) {
            const idata = ctx.getImageData(0, 0, SPRITE_W, SPRITE_H); const data = idata.data;
            const steps = Math.ceil(amount);
            for (let s = 0; s < steps; s++) {
                const copy = new Uint8ClampedArray(data);

                    for (let x = 1; x < SPRITE_W - 1; x++) {
                        const i = (y * SPRITE_W + x) * 4;
                        if (copy[i + 3] === 0) continue;
                        const minA = Math.min(copy[((y - 1) * SPRITE_W + x) * 4 + 3], copy[((y + 1) * SPRITE_W + x) * 4 + 3], copy[(y * SPRITE_W + (x - 1)) * 4 + 3], copy[(y * SPRITE_W + (x + 1)) * 4 + 3]);
                        if (minA < 255) data[i + 3] = Math.max(0, data[i + 3] - 128);

        function applyEdgeBlur(ctx, radius) {
            const w = SPRITE_W, h = SPRITE_H;
            const original = ctx.getImageData(0, 0, w, h);
            const mask = new Uint8ClampedArray(w * h);
            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const i = (y * w + x) * 4; if (original.data[i + 3] === 0) continue;
                    const isEdge = [original.data[((y - 1) * w + x) * 4 + 3], original.data[((y + 1) * w + x) * 4 + 3], original.data[(y * w + (x - 1)) * 4 + 3], original.data[(y * w + (x + 1)) * 4 + 3]].some(na => na < 200);
                    if (isEdge) mask[y * w + x] = 255;
                }
            }
            const temp = document.createElement('canvas'); temp.width = w; temp.height = h;
            const tCtx = temp.getContext('2d'); tCtx.filter = `blur(${radius}px)`; tCtx.drawImage(ctx.canvas, 0, 0);
            const blurred = tCtx.getImageData(0, 0, w, h); const result = ctx.getImageData(0, 0, w, h);
            for (let i = 0; i < w * h; i++) { if (mask[i] === 255) { const idx = i * 4; result.data[idx] = blurred.data[idx]; result.data[idx+1] = blurred.data[idx+1]; result.data[idx+2] = blurred.data[idx+2]; result.data[idx+3] = blurred.data[idx+3]; } }
            ctx.putImageData(result, 0, 0);
        }
        function drawOutlineRefined(ctx, mainBuffer, width, offset, colorMatch, alpha) {
            const w = SPRITE_W, h = SPRITE_H;
            const mCtx = document.createElement('canvas').getContext('2d'); mCtx.canvas.width = w; mCtx.canvas.height = h; mCtx.drawImage(mainBuffer, 0, 0);
            if (offset > 0) erodeAlpha(mCtx, offset * 2);
            const maskData = mCtx.getImageData(0, 0, w, h).data;
            const outImg = ctx.createImageData(w, h); const outData = outImg.data;
            const range = Math.ceil(width + 1);
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = (y * w + x) * 4; if (maskData[i + 3] > 100) continue;
                    let bestDistSq = Infinity, sampleColorIdx = -1;
                    for (let dy = -range; dy <= range; dy++) {
                        for (let dx = -range; dx <= range; dx++) {
                            const nx = x + dx, ny = y + dy;
                            if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                                const nIdx = (ny * w + nx) * 4;
                                if (maskData[nIdx + 3] > 150) { 
                                    const d2 = dx*dx + dy*dy;
                                    if (d2 <= width * width && d2 < bestDistSq) { bestDistSq = d2; sampleColorIdx = nIdx; }
                                }
                            }
                        }
                    }
                    if (bestDistSq !== Infinity) {
                        let r = 60, g = 60, b = 70;
                        if (colorMatch > 0 && sampleColorIdx !== -1) {
                            r = r * (1 - colorMatch/2) + (maskData[sampleColorIdx] * 0.7) * (colorMatch/2);
                            g = g * (1 - colorMatch/2) + (maskData[sampleColorIdx+1] * 0.7) * (colorMatch/2);
                            b = b * (1 - colorMatch/2) + (maskData[sampleColorIdx+2] * 0.7) * (colorMatch/2);
                        }
                        outData[i] = r; outData[i+1] = g; outData[i+2] = b; outData[i+3] = alpha * 255;
                    }
                }
            }
            const temp = document.createElement('canvas'); temp.width = w; temp.height = h;
            temp.getContext('2d').putImageData(outImg, 0, 0); ctx.drawImage(temp, 0, 0);
        }

        function applyEffects(sourceCanvas) {
            const tx = parseInt(trimXInput.value), ty = parseInt(trimYInput.value);
            const out = document.createElement('canvas'); out.width = SPRITE_W; out.height = SPRITE_H;
            const ctx = out.getContext('2d');
            const buffer = document.createElement('canvas'); buffer.width = SPRITE_W; buffer.height = SPRITE_H;
            const bCtx = buffer.getContext('2d');
            bCtx.drawImage(sourceCanvas, tx, ty, SPRITE_W - tx*2, SPRITE_H - ty*2, tx, ty, SPRITE_W - tx*2, SPRITE_H - ty*2);
            const threshold = parseInt(thresholdInput.value);
            const idata = bCtx.getImageData(0, 0, SPRITE_W, SPRITE_H);
            for (let i = 0; i < idata.data.length; i += 4) {

        function loop(timestamp) {
