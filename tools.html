<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Tools Launcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="apple-touch-icon" href="AutoLauncher.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Auto Launcher">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        body {
            background-color: #f3f4f6;
            min-height: 100vh;
        }
        .card {
            transition: all 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .group-header {
            cursor: pointer;
            user-select: none;
        }
        .group-header:hover {
            background-color: #f9fafb;
        }
        .chevron {
            transition: transform 0.2s;
        }
        .chevron.open {
            transform: rotate(180deg);
        }

        /* Pull to Refresh */
        html, body {
            overscroll-behavior-y: none;
        }
        #ptr-indicator {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: height 0.2s ease;
            z-index: 9999;
            border-radius: 0 0 16px 16px;
        }
        #ptr-indicator.visible {
            height: 48px;
        }
        #ptr-spinner {
            width: 22px;
            height: 22px;
            border: 2.5px solid rgba(255,255,255,0.35);
            border-top-color: white;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.15s;
        }
        #ptr-indicator.visible #ptr-spinner {
            opacity: 1;
        }
        #ptr-spinner.spin {
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-800">

    <!-- Pull to Refresh インジケーター -->
    <div id="ptr-indicator">
        <div id="ptr-spinner"></div>
    </div>

    <div class="max-w-3xl mx-auto">
        <header class="mb-8 text-center">
            <div class="inline-block p-3 rounded-2xl gradient-bg mb-4 shadow-lg">
                <span class="text-3xl">🚀</span>
            </div>
            <h1 class="text-3xl font-bold mb-2">Auto Launcher</h1>
            <p id="current-info" class="text-gray-500 font-medium">URLを解析中だゆ...🥺</p>
        </header>

        <!-- 手動入力セクション -->
        <div id="manual-config" class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-gray-100 hidden">
            <p class="text-sm text-blue-600 mb-4 font-bold">⚠️ URLからリポジトリを特定できなかったゆ。手動で教えてだゆ！🥺</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ユーザー名</label>
                    <input type="text" id="username" placeholder="GitHubユーザー名" class="w-full p-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">リポジトリ名</label>
                    <input type="text" id="repo" placeholder="リポジトリ名" class="w-full p-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <button id="fetchBtn" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                この設定で読み込むゆ！🥺
            </button>
        </div>

        <div id="status" class="text-center text-gray-500 mb-4 hidden">
            <div class="animate-bounce mb-2">🔍</div>
            読み込み中だゆ...🥹
        </div>

        <div id="linkContainer" class="flex flex-col gap-4">
            <!-- リンクがここに自動生成されるゆ -->
        </div>
    </div>

    <script>
        const infoText = document.getElementById('current-info');
        const manualConfig = document.getElementById('manual-config');
        const usernameInput = document.getElementById('username');
        const repoInput = document.getElementById('repo');
        const fetchBtn = document.getElementById('fetchBtn');
        const linkContainer = document.getElementById('linkContainer');
        const statusMsg = document.getElementById('status');

        // Pull to Refresh
        const ptrIndicator = document.getElementById('ptr-indicator');
        const ptrSpinner = document.getElementById('ptr-spinner');

        let touchStartY = 0;
        let isPulling = false;
        let isRefreshing = false;
        const THRESHOLD = 70;

        // PWA standalone では body のスクロールが効かないので scrollable な要素を動的に特定するゆ
        function getScrollTop() {
            return document.documentElement.scrollTop || document.body.scrollTop || window.scrollY || 0;
        }

        document.addEventListener('touchstart', (e) => {
            if (getScrollTop() === 0 && !isRefreshing) {
                touchStartY = e.touches[0].clientY;
                isPulling = true;
            }
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (!isPulling || isRefreshing) return;
            const diff = e.touches[0].clientY - touchStartY;
            if (diff <= 0) { isPulling = false; return; }
            ptrIndicator.classList.add('visible');
        }, { passive: true });

        document.addEventListener('touchend', async (e) => {
            if (!isPulling || isRefreshing) return;
            isPulling = false;
            const diff = e.changedTouches[0].clientY - touchStartY;

            if (diff >= THRESHOLD) {
                isRefreshing = true;
                ptrSpinner.classList.add('spin');
                await doRefresh();
                ptrSpinner.classList.remove('spin');
                setTimeout(() => {
                    ptrIndicator.classList.remove('visible');
                    isRefreshing = false;
                }, 300);
            } else {
                ptrIndicator.classList.remove('visible');
            }
            touchStartY = 0;
        });

        async function doRefresh() {
            const user = localStorage.getItem('gh_user') || (window.location.hostname.endsWith('.github.io') ? window.location.hostname.split('.')[0] : '');
            const repo = localStorage.getItem('gh_repo') || (window.location.hostname.endsWith('.github.io') ? window.location.pathname.split('/')[1] : '');
            if (user && repo) {
                await fetchGitHubFiles(user, repo);
            }
        }

        async function init() {
            const hostname = window.location.hostname;
            const pathname = window.location.pathname;
            
            let user = "";
            let repo = "";

            if (hostname.endsWith(".github.io")) {
                user = hostname.split('.')[0];
                repo = pathname.split('/')[1];
            }

            if (user && repo) {
                infoText.innerHTML = `ユーザー: <a href="https://github.com/${user}" target="_blank" class="text-blue-500 underline font-bold">${user}</a> / リポジトリ: <a href="https://github.com/${user}/${repo}" target="_blank" class="text-blue-500 underline font-bold">${repo}</a> 🥺✨`;
                fetchGitHubFiles(user, repo);
            } else {
                infoText.innerText = `GitHub Pages上で動かしてだゆ！🥺`;
                manualConfig.classList.remove('hidden');
                
                const savedUser = localStorage.getItem('gh_user');
                const savedRepo = localStorage.getItem('gh_repo');
                if (savedUser) usernameInput.value = savedUser;
                if (savedRepo) repoInput.value = savedRepo;
            }
        }

        fetchBtn.onclick = () => {
            const user = usernameInput.value.trim();
            const repo = repoInput.value.trim();
            if (user && repo) {
                localStorage.setItem('gh_user', user);
                localStorage.setItem('gh_repo', repo);
                fetchGitHubFiles(user, repo);
            }
        };

        function parseSerialName(name) {
            const stem = name.replace(/\.html$/i, '');
            const m = stem.match(/^(.*?)(\d+)$/);
            if (m) return { base: m[1], num: parseInt(m[2]) };
            return null;
        }

        async function fetchGitHubFiles(user, repo) {
            statusMsg.classList.remove('hidden');
            linkContainer.innerHTML = '';

            try {
                const currentFile = window.location.pathname.split('/').pop() || 'index.html';

                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/`);
                if (!response.ok) throw new Error('データが取れなかったゆ...🥺');

                const files = await response.json();
                const htmlFiles = files
                    .filter(f => f.name.endsWith('.html') && f.name !== currentFile)
                    .sort((a, b) => a.name.localeCompare(b.name));

                if (htmlFiles.length === 0) {
                    linkContainer.innerHTML = '<div class="text-center py-12 text-gray-400 bg-white rounded-2xl border border-dashed border-gray-300">他のHTMLファイルが見つからないゆ...🥺</div>';
                    return;
                }

                const allStems = new Set(htmlFiles.map(f => f.name.replace(/\.html$/i, '')));
                const groups = {};
                const singles = [];

                htmlFiles.forEach(file => {
                    const pagesUrl = `https://${user}.github.io/${repo}/${file.name}`;
                    const stem = file.name.replace(/\.html$/i, '');
                    const parsed = parseSerialName(file.name);

                    if (parsed && parsed.base !== '') {
                        if (!groups[parsed.base]) groups[parsed.base] = [];
                        groups[parsed.base].push({ name: file.name, num: parsed.num, url: pagesUrl });
                    } else {
                        const hasNumberedSibling = [...allStems].some(s => {
                            const m = s.match(/^(.*?)(\d+)$/);
                            return m && m[1] === stem;
                        });
                        if (hasNumberedSibling) {
                            if (!groups[stem]) groups[stem] = [];
                            groups[stem].push({ name: file.name, num: 0, url: pagesUrl });
                        } else {
                            singles.push({ name: file.name, url: pagesUrl });
                        }
                    }
                });

                const trueGroups = {};
                Object.entries(groups).forEach(([base, items]) => {
                    if (items.length >= 2) {
                        trueGroups[base] = items;
                    } else {
                        singles.push(...items);
                    }
                });

                singles.sort((a, b) => a.name.localeCompare(b.name)).forEach(f => {
                    linkContainer.appendChild(makeSingleCard(f.name, f.url));
                });

                Object.entries(trueGroups).forEach(([base, items]) => {
                    items.sort((a, b) => b.num - a.num);
                    linkContainer.appendChild(makeGroupCard(base, items));
                });

            } catch (err) {
                linkContainer.innerHTML = `<div class="bg-red-50 text-red-500 p-6 rounded-2xl text-center font-bold">${err.message}</div>`;
            } finally {
                statusMsg.classList.add('hidden');
            }
        }

        function makeSingleCard(name, url) {
            const card = document.createElement('div');
            card.className = 'card bg-white p-5 rounded-2xl border border-gray-100 flex justify-between items-center shadow-sm';
            card.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="bg-blue-50 p-3 rounded-xl text-xl">📄</div>
                    <div>
                        <h3 class="font-bold text-gray-800">${name}</h3>
                        <p class="text-xs text-gray-400 uppercase tracking-widest">HTML Tool</p>
                    </div>
                </div>
                <a href="${url}" class="bg-gray-800 hover:bg-black text-white px-5 py-2 rounded-xl text-sm font-bold transition shadow-md">
                    開くゆ！🥹
                </a>
            `;
            return card;
        }

        function makeGroupCard(base, items) {
            const wrapper = document.createElement('div');
            wrapper.className = 'bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden';

            const header = document.createElement('div');
            header.className = 'group-header flex items-center gap-4 p-5';
            header.innerHTML = `
                <svg class="chevron w-4 h-4 text-gray-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
                <div class="bg-purple-50 p-3 rounded-xl text-xl">📂</div>
                <div class="flex-1">
                    <h3 class="font-bold text-gray-800">${base}* <span class="text-xs text-gray-400 font-normal">${items.length}件</span></h3>
                    <p class="text-xs text-gray-400 uppercase tracking-widest">Serial Group</p>
                </div>
            `;

            const body = document.createElement('div');
            body.className = 'border-t border-gray-100';

            items.forEach(f => {
                const row = document.createElement('div');
                row.className = 'flex justify-between items-center px-5 py-3 hover:bg-gray-50 transition';
                row.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="text-gray-300 text-sm font-mono w-5 text-right">${f.num === 0 ? '—' : f.num}</div>
                        <span class="text-sm text-gray-700 font-medium">${f.name}</span>
                    </div>
                    <a href="${f.url}" class="bg-gray-800 hover:bg-black text-white px-4 py-1.5 rounded-xl text-xs font-bold transition shadow-sm">
                        開くゆ！🥹
                    </a>
                `;
                body.appendChild(row);
            });

            body.style.display = 'none';
            header.addEventListener('click', () => {
                const chevron = header.querySelector('.chevron');
                const isOpen = body.style.display !== 'none';
                body.style.display = isOpen ? 'none' : 'block';
                chevron.classList.toggle('open', !isOpen);
            });

            wrapper.appendChild(header);
            wrapper.appendChild(body);
            return wrapper;
        }

        init();
    </script>
</body>
</html>
